notes: >
  ## ILA Cross-Trigger 调试同步架构

  参考 UG908 §ILA Cross Trigger 和用户提供的完整方案。

  ### 架构
  ```
  PL anchor event (FSM 启动边沿/AXIS 第一拍)
       ↓
  dbg_trigger_hub (同步/展宽)
       ├── ila_ctrl.trig_in  (控制 FSM / AXI-Lite)
       ├── ila_axis.trig_in  (AXIS / DMA 数据通路)
       └── ila_dma.trig_in   (DMA 状态)
  ```

  ### 关键设计决策
  - dbg_anchor_event 选 PL 内部确定事件（非 PS 脚本动作）
  - 所有 ILA 被动观察者模式 (TRIG_IN_ONLY)
  - 先 arm ILA，再启动 PS（Tcl 保证顺序）
  - 辅助信号: cycle_counter, trig_in/ack, fsm_state, first_beat_flag

  ### 与当前 BD ILA 的差异
  - 当前: System ILA v1.1 BD 例化 (SLOT 探针, 无 TRIG_IN)
  - 目标: ila_v6_2 RTL 例化 (显式探针端口, TRIG_IN/TRIG_OUT)
  - RTL ILA 需在综合中连接 MARK_DEBUG 信号

  ### 后续步骤
  - L0: RTL review → L1a: 仿真验证 anchor event 产生 → L2-L4: 综合/实现/比特流
  - L5-L6: 上板验证 cross-trigger + 自动化 Tcl
