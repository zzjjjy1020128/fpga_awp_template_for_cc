notes: >
  ## 数据通路切片：写通路

  ```
  s_axis_tdata/tvalid/tready/tlast/tuser
      → axis_input
          → write_addr[ADDR_W-1:0]
          → write_data[DATA_W-1:0]
          → write_en
              → frame_buf_mgr (port A)
                  → BRAM[write_addr] <= write_data
  ```

  ## 关键验证点

  1. **时序对齐**：axis_input 输出的 write_addr/write_en 与 write_data 的相位关系
     - write_data 经过 axis_input 内部寄存器后应与 write_addr 同时到达 frame_buf_mgr
  2. **跨帧状态**：capture_done → 新的 capture_en 之间，frame_buf_mgr 的写指针是否复位
  3. **tready 反压**：axis_input 的 tready 是否受 frame_buf_mgr 状态影响（当前设计 tready 仅由 capture_en 控制）
  4. **地址空间**：确认 write_addr 不会溢出 BRAM 深度（受 img_rows × img_cols 约束）
