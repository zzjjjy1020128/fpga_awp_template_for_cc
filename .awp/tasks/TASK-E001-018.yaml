notes: >
  ## AX7010 平台信息

  - 开发板: Alinx AX7010
  - 主芯片: xc7z020clg400-2 (Zynq-7000, CLG400 封装, speed -2)
  - PS: ARM Cortex-A9 ×2, DDR3 控制器
  - PL: Artix-7 架构, ~85K 逻辑单元
  - 与 ZCU102 (xczu9eg) 的关键差异:
    - PS: PS7 (processing_system7) 替代 PS8 (zynq_ultra_ps_e)
    - AXI HP 接口位宽不同 (32/64-bit vs always 64-bit)
    - 资源容量: LUT ~53K vs ~274K, BRAM ~140 vs ~912
    - 无 GTH/GTY transceiver

  ## 工作流

  1. 用户提供 AX7010 的 BD 基座 (.bd 文件)
  2. Agent 创建 Vivado 工程，导入 BD
  3. Agent 打包 axil_2d_shift IP（目标器件 xc7z020，可能与 xczu9eg 版本不同）
  4. Agent 编写约束文件
  5. Agent 运行综合 → 实现 → 比特流
  6. Agent 创建平台清单并冻结
  7. Agent 注册到 workspace_manifest.json

  ## 与 ZCU102 基座的关系

  两个基座独立冻结、独立版本管理。
  Accelerator IP (axil_2d_shift) 需要分别为两个器件打包（IP 参数相同，仅目标器件不同）。
  上层 RTL 源码共享同一套 `rtl/*.sv`。
