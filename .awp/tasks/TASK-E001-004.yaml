notes: >
  ## 接口定义

  ### 参数
  - DATA_WIDTH (default 8)
  - MAX_ROWS (default 64)
  - MAX_COLS (default 64)

  ### AXI-Stream Slave 端口
  - s_axis_tdata[DATA_WIDTH-1:0], s_axis_tvalid, s_axis_tready
  - s_axis_tlast (行结束), s_axis_tuser (帧起始)

  ### 控制接口
  - capture_en (来自 ctrl_fsm)
  - img_rows[9:0], img_cols[9:0] (来自 regs_top)

  ### 输出到 frame_buf_mgr
  - write_addr[11:0] (MAX_ROWS*MAX_COLS=4096, 12-bit 足够)
  - write_data[DATA_WIDTH-1:0]
  - write_en (写使能)

  ### 输出到 ctrl_fsm
  - capture_done (1-cycle pulse, 采集完一帧)

  ## 设计要点
  - capture_en=0 时不接收数据（tready=0）
  - tuser=1 时重置计数器到 0
  - tlast=1 时 col_cnt 归零，row_cnt+1
  - 每拍有效传输 col_cnt+1
  - 总采集元素数 = img_rows * img_cols，收满后产出 capture_done 脉冲
  - write_addr 可用组合逻辑：row_cnt * IMG_COLS + col_cnt
