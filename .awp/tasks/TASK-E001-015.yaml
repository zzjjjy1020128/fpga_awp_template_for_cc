notes: >
  ## Block Design 组件

  - Zynq7 Processing System (PS7): FCLK_CLK0=100MHz, DDR, UART1
  - AXI Interconnect: PS GP0 → PL (1:2)
  - AXI SmartConnect: PL → PS HP0 (2:1)
  - AXI DMA: Simple mode, 8-bit MM2S/S2MM
  - ILA: 2 cores (capture monitor + shift monitor)
  - axil_2d_shift: RTL module unchanged

  ## 关键约束

  - 外部 IOB: 0（clk 由 PS FCLK 内部提供，rstn 由 Processor System Reset 提供）
  - 使用 Vivado 2022.2 MCP 工具
