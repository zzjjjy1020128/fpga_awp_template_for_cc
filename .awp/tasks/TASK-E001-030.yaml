notes: >
  ## 背景

  之前多次遇到以下一致性问题：
  1. 修改了 IP RTL 但 BD 仍使用旧版本（需要 IP Upgrade）
  2. BD 中手动连接 ILA probe 后未重新 export XSA → Vitis 用的 XSA 不含新 probe
  3. IP 的 RTL 与项目 rtl/ 目录中的同名文件可能分叉（两个副本）
  4. XSA 导出后未验证时间戳 → 不确定 BSP 和 bitstream 是否配套
  5. XCI 文件被删除 → BD 丢失 IP 实例配置

  ## Phase 计划

  Phase 1 (vivado_integrator):
  - preflight 检查 IP/BD/XSA 一致性
  - 修复 IP/BD 不一致（如有）
  - 综合 → 实现 → 比特流
  - XSA 导出 + 一致性验证

  Phase 2 (hardware_validator):
  - 上板 L5 冒烟测试
  - JTAG / ILA / AXI-Lite 功能确认

  Phase 3 (orchestrator):
  - 汇总产物一致性问题到 ISS
  - 更新相关 skills（preflight / methodology / platform-freeze）
  - 将验证过的检查点固化到 skill 中
