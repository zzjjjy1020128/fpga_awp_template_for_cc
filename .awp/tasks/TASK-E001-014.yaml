notes: >
  ## 背景

  当前设计将 102 个信号全部引到外部 IOB（81.6% 利用率），在 xc7z020 Zynq-7000
  上浪费了 PS 端的 AXI 接口能力。IOB 时钟偏斜 5.2ns 是 100MHz 时序难以收敛
  的根因。

  ## Block Design 预期组件

  - Zynq7 Processing System (PS7)
  - AXI Interconnect (PS GP0 → PL)
  - AXI-Stream DMA 或 AXI-Stream FIFO
  - ILA (Integrated Logic Analyzer) 核
  - Processor System Reset
