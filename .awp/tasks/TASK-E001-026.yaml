notes: >
  ## L7 复盘范围

  L7 = "性能/资源复盘"（workspace_manifest.json）

  此 task 覆盖全部上板验证阶段（B0-B4）的结果汇总。process_owner 以只读方式
  审查所有 BOARD run record，提取关键数据和经验教训。

  ### 复盘重点
  1. 为什么 100MHz 在 xc7z010-1 上不收敛（shift_addr_gen DSP 路径 16-20 级逻辑）
  2. ILA 探针在实际调试中的有效性（哪些信号最有用、哪些没用上）
  3. DMA 环回测试发现的软件/硬件交互问题
  4. B-G4 迭代模型是否有效控制了上板迭代成本

  ### 不需要的内容
  - 不需要重新跑综合/实现（数据来自已有 run record）
  - 不需要重新设计架构（复盘不是规划）
