notes: >
  ## 综合配置

  - 目标器件：xc7z020clg400-1（Zynq-7000，Xilinx）
  - 主时钟：clk = 100MHz（10ns 周期）
  - 复位：rstn，异步复位同步释放（在 RTL 中处理）

  ## Vivado 工程结构

  ```
  vivado/axil_2d_shift.xpr
  constraints/timing.xdc
  ```

  ## 关键检查项

  1. 扇出（fanout）：rstn 复位信号可能高扇出，检查是否需要 BUFG
  2. BRAM 推断：frame_buf_mgr 的 4096 深度 BRAM 是否正确推断为 Block RAM
  3. 时序：100MHz 下所有路径 slack >= 0
  4. DSP/资源利用率：确认在目标器件容量内
