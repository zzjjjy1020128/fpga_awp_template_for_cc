notes: >
  ## 接口定义

  ### 参数
  - DATA_WIDTH (default 8)
  - MAX_ROWS (default 64)
  - MAX_COLS (default 64)

  ### AXI-Stream Master 端口
  - m_axis_tdata[DATA_WIDTH-1:0], m_axis_tvalid, m_axis_tready
  - m_axis_tlast (行结束), m_axis_tuser (帧起始)

  ### 控制接口
  - shift_en (来自 ctrl_fsm)
  - img_rows[9:0], img_cols[9:0] (来自 regs_top)

  ### 来自 frame_buf_mgr
  - read_data[DATA_WIDTH-1:0] (BRAM 读数据)
  - zero_fill (来自 shift_addr_gen, 补零模式越界标志)

  ### 输出
  - read_addr[11:0] → frame_buf_mgr → shift_addr_gen (本模块不直接输出 read_addr，由 shift_addr_gen 提供)
  - shift_done → ctrl_fsm

  ## 设计要点
  - shift_en=0 时 tvalid=0（不输出）
  - 内部 row_cnt/col_cnt 计数器，从 0 开始，光栅扫描
  - tuser=1 在第一个输出元素（row_cnt=0, col_cnt=0）
  - tlast=1 在每行最后一个元素（col_cnt == img_cols-1）
  - zero_fill=1 时 m_axis_tdata = 0
  - 最后一拍输出后发出 shift_done 脉冲（1 周期）
  - 下游 tready=0 时暂停（计数器不变，等待背压释放）
