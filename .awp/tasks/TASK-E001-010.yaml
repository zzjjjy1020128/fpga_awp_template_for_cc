notes: >
  ## 数据通路切片：读通路

  ```
  shift_addr_gen
      → read_addr[ADDR_W-1:0]
      → zero_fill
          → [1-stage pipeline reg in top] → zero_fill_d1
              → frame_buf_mgr (port B)
                  → read_data[DATA_W-1:0]   (1 cycle latency)
                      → axis_output
                          → m_axis_tdata/tvalid/tready/tlast/tuser
  ```

  ## 关键验证点（来自 L1c 失败经验）

  1. **shift_addr_gen 初始状态**：L1c 失败时 sg_col=3 sg_row=1 而非 (0,0)——需确认单 datapath 场景下初始状态正确
  2. **BRAM read_data 延迟**：frame_buf_mgr 有 1 cycle 读延迟，
     read_data 在 read_addr 有效后的第 2 拍才稳定（1 BRAM + 1 pipeline register）
  3. **zero_fill 对齐**：顶层 axil_2d_shift.sv 中的 zero_fill_d1 寄存器是否正确插入
  4. **axis_output 跨帧复位**：shift_en 下降沿时 all_done 清零、行列计数器复位
