notes: >
  ## ZCU102 L6 验证

  使用 TASK-E001-023 开发的共享 PS DMA 软件（平台头文件区分 PS7/PS8）。
  ZCU102 是备选平台，可在 AX7010 L6 通过后进行。

  ### 与 AX7010 的差异
  - 100MHz vs 50MHz：时序余量更小（WHS +0.010ns），但仍在安全范围内
  - ILA 6.2 探针深度 1024，与 AX7010 System ILA 相同
  - PS8 DDR 基地址与 PS7 不同，需确认 lscript.ld 中的内存映射
