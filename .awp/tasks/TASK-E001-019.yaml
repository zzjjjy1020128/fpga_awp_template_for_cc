notes: >
  ## AX7010 平台 ILA 配置

  当前 AX7010 基座 BD 包含两个 System ILA 核（system_ila_0, system_ila_1），
  均为 xilinx.com:ip:system_ila:1.1。System ILA 的优势：通过 MARK_DEBUG 属性
  自动连接探针，无需在 BD 中手动连线。

  ### 探针分配建议

  **system_ila_0** (AXI 接口监控):
  - s_axil_awaddr, s_axil_wdata, s_axil_araddr, s_axil_rdata
  - s_axil_awvalid, s_axil_wvalid, s_axil_arvalid
  - s_axil_awready, s_axil_wready, s_axil_arready, s_axil_rvalid

  **system_ila_1** (数据通路监控):
  - s_axis_tdata, s_axis_tvalid, s_axis_tready, s_axis_tlast
  - m_axis_tdata, m_axis_tvalid, m_axis_tready, m_axis_tlast
  - ctrl_fsm 状态机 state 寄存器
  - shift_addr_gen 的行/列计数器

  ### 基座冻结规则
  基座约束中 debug 类标记为 modifiable（见平台清单 freeze_rules），
  创建 debug.xdc 不破坏基座冻结。
