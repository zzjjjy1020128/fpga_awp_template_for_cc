notes: >
  ## Zynq 上板验证完整工作流

  ```
  Vivado: XSA 导出 (含 bitstream + PS 配置 + IP 地址映射)
    → Vitis: 导入 XSA → 创建 Platform 工程 (自动生成 FSBL + BSP + device tree)
      → Vitis: 创建 Application 工程 (C 代码)
        → Vitis: Build → 生成 ELF
          → Vitis: Run/Debug → FSBL 自动初始化 PS (PLL/时钟/DDR)
            → 自动加载 bitstream (PL 配置)
              → 自动加载 ELF (PS 程序)
                → FCLK_CLK0 时钟运行 → debug hub 可检测 → ILA 可用
                  → PS 程序通过 UART 输出测试结果
  ```

  ### L5 冒烟测试与 Vitis 的关系
  L5 冒烟测试 (TASK-E001-021) 依赖本 task 产出的 Vitis 工程和基础 C 程序。
  原因：Zynq-7000 的 PL 时钟 (FCLK_CLK0) 来自 PS PLL，PS 必须先由 FSBL 初始化
  才能输出时钟 → debug hub 才能被 Hardware Manager 检测 → ILA 才能使用。
  这个限制在 ZCU102 (PS8) 上同样存在。

  ### 工具链
  - Vitis 2022.2（与 Vivado 同版本）
  - Standalone BSP（裸机程序，无 Linux）
  - 编译器：arm-none-eabi-gcc (PS7 Cortex-A9)

  ### 软件架构
  ```
  main.c
    ├── init_platform(): 初始化 UART、中断控制器
    ├── axil_reg_test(): AXI-Lite 寄存器读写 + UART 输出 PASS/FAIL
    ├── dma_loopback_test(): DMA MM2S→S2MM 环回 + 数据比对
    ├── accel_test(): DMA MM2S→加速器→S2MM + golden 比对
    ├── dump_*(): PS 端数据 dump 函数（发现错误时打印 expected vs actual）
    └── UART 输出测试结果
  ```

  ### XSA 信息
  - 路径: vivado/shift_2d_ax7010_260608/xsa_export/design_1_wrapper.xsa
  - 大小: 686 KB
  - 含 bitstream (2.0 MB) + PS7 配置 (DDR/时钟/外设) + IP 地址映射

  ### 关键注意事项
  - AXI-Lite 基地址从 xparameters.h (BSP 自动生成) 获取
  - DMA 缓冲区需 non-cacheable (使用 Xil_DCacheFlushRange/Xil_DCacheInvalidateRange)
  - 数据宽度：8-bit (DMA 配置的 MM2S/S2MM width)
  - 中断：s2mm_introut → xlconcat → PS IRQ_F2P
