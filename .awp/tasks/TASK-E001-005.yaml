notes: >
  ## 接口定义

  ### 参数
  - MAX_ROWS (default 64)
  - MAX_COLS (default 64)

  ### 控制输入
  - cfg_dir[2:0], cfg_step[4:0], cfg_wrap_en (来自 regs_top)
  - shift_en (来自 ctrl_fsm)
  - img_rows[9:0], img_cols[9:0] (来自 regs_top)

  ### 输出到 frame_buf_mgr
  - read_addr[11:0]
  - zero_fill (补零模式下超出边界时为 1)

  ## 地址计算逻辑（来自 architecture.md 3.6 节）

  设 base_addr = row * IMG_COLS + col（按光栅顺序输出）

  | Mode | dir | Read Address |
  |------|-----|--------------|
  | NONE | 000 | base_addr |
  | UP   | 001 | ((row + step) % IMG_ROWS) * IMG_COLS + col |
  | DOWN | 010 | ((row - step + IMG_ROWS) % IMG_ROWS) * IMG_COLS + col |
  | LEFT | 011 | row * IMG_COLS + ((col + step) % IMG_COLS) |
  | RIGHT| 100 | row * IMG_COLS + ((col - step + IMG_COLS) % IMG_COLS) |

  当 wrap_en=0 时：
  - UP: row + step >= IMG_ROWS → zero_fill=1
  - DOWN: row - step < 0 → zero_fill=1
  - LEFT: col + step >= IMG_COLS → zero_fill=1
  - RIGHT: col - step < 0 → zero_fill=1

  ## 设计要点
  - 需要内部 row_cnt/col_cnt 计数器跟踪输出位置（0 到 IMG_ROWS*IMG_COLS-1）
  - 每次 shift_en=1 时计数器递增
  - 读地址由组合逻辑生成（基于当前 row_cnt/col_cnt 和配置参数）
  - 无需流水线（简单设计），乘法/取模由综合工具优化
  - 非法 dir 值（101-111）按 NONE 处理
