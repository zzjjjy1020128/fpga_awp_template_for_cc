notes: >
  ## L6 数据正确性验证

  L6 = "板上数据正确性测试"（workspace_manifest.json）

  ### 测试矩阵
  | 参数 | 取值 |
  |------|------|
  | 移位方向 | 左、右、上、下 |
  | 移位步长 | 1, 2, half_width, half_height |
  | 帧尺寸 | 8x8, 64x64, 15x31 (odd), max(regs_top configured) |
  | 边界模式 | wrapping, no-wrapping (zero fill) |
  | 数据模式 | 递增、棋盘格、全0、全1 |

  ### Golden 数据来源
  仿真 L1c 阶段生成的 golden reference（来自 tb/tb_axil_2d_shift.sv 的参考模型输出）。
  若仿真未保存 golden 文件，需先从仿真中重新导出。

  ### 失败处理
  遵循 B-G4 上板迭代模型。L6 阶段典型失败类别：CAT-SW, CAT-DT, CAT-RT。
  最昂贵的是 CAT-RT（RTL bug）：必须用 ILA 证据确认后才能触发 RTL 回修。
  每次上板 session 必须一次性采集 ILA 波形 + PS 日志 + DMA 状态。

  ### 平台特定
  AX7010 是主力平台，L6 验证优先在此完成。50MHz 时钟下 DMA 传输速率受限，
  但不影响数据正确性验证。
