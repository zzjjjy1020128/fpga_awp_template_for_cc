notes: >
  ## 接口定义

  ### 参数
  - DATA_WIDTH (default 8)
  - MAX_ROWS (default 64)
  - MAX_COLS (default 64)
  - ADDR_WIDTH = $clog2(MAX_ROWS * MAX_COLS) (default 12)

  ### 端口 A（写端口，连接 axis_input）
  - write_clk (clk)
  - write_addr[ADDR_WIDTH-1:0]
  - write_data[DATA_WIDTH-1:0]
  - write_en

  ### 端口 B（读端口，连接 shift_addr_gen + axis_output）
  - read_clk (clk)
  - read_addr[ADDR_WIDTH-1:0]
  - read_data[DATA_WIDTH-1:0]（组合逻辑输出或寄存器输出均可）

  ## 设计要点
  - 使用 SystemVerilog reg array 推断 BRAM：`reg [DATA_WIDTH-1:0] bram [0:DEPTH-1]`
  - 双端口：两个 always_ff 块分别处理 A 端口写和 B 端口读
  - 读端口可用组合逻辑（`assign read_data = bram[read_addr]`）或寄存器输出
  - 同时读写同一地址时，行为由综合工具决定（通常 read-first），不做额外处理
  - 不需要读写冲突保护逻辑
