notes: >
  ## ZCU102 平台 ILA 配置

  ZCU102 基座 BD 包含两个 ILA 6.2 核（ila_capture, ila_shift）。
  **与 AX7010 的 System ILA 不同**：ILA 6.2 的探针需要通过以下方式之一连接：
  1. BD 中 connect_bd_net 显式连线（需修改 BD，违反基座冻结规则）
  2. RTL 中 MARK_DEBUG + 综合时自动连接（推荐，不修改 BD）

  **推荐方案**：使用 RTL MARK_DEBUG 方式。在 debug_zcu102.xdc 中设置
  set_property MARK_DEBUG，Vivado 综合时自动将标记信号路由到 ILA 探针。
  此方案不修改 BD 拓扑，符合基座 freeze_rules。

  ### 探针分配
  - ila_capture：s_axis_*, capture_en, write_addr/data
  - ila_shift：shift_en, read_addr, m_axis_*, zero_fill, ctrl_fsm state

  ZCU102 作为备选平台，可在 AX7010 验证完成后再进行。
