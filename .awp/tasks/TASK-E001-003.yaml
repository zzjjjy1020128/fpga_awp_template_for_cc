notes: >
  ## 接口定义（来自 architecture.md）

  ### 输入
  - clk, rstn
  - ctrl_start, ctrl_sw_reset（来自 regs_top）
  - capture_done（来自 axis_input，采集完成脉冲）
  - shift_done（来自 axis_output，移位输出完成脉冲）
  - img_rows[9:0], img_cols[9:0]（来自 regs_top，传递给下游或用于计数校验）

  ### 输出
  - status_idle, status_busy_capture, status_busy_shift, status_done（连 regs_top STATUS 输入）
  - capture_en（使能 axis_input 采集）
  - shift_en（使能 shift_addr_gen 和 axis_output）

  ## 状态转换
  - IDLE: 等待 start=1 → CAPTURE；输出 idle=1
  - CAPTURE: 采集数据，capture_en=1；capture_done=1 → SHIFT
  - SHIFT: 移位输出，shift_en=1；shift_done=1 → DONE
  - DONE: done=1 一周期 → 自动返回 IDLE
  - 任意状态：sw_reset=1 → IDLE

  ## Review 问题
  - F4（采集超时保护）：本 task 暂不实现超时计数器，保持简单状态机
  - F3（error 位）：暂不实现，STATUS.error 固定为 0（已在 regs_top 中处理）
