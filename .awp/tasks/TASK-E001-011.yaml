  - "CTRL.start 触发 ctrl_fsm: IDLE → CAPTURE，capture_en=1"
  - "capture_done 触发 ctrl_fsm: CAPTURE → SHIFT，shift_en=1，capture_en=0"
  - "shift_done 触发 ctrl_fsm: SHIFT → DONE → IDLE（自动），STATUS.done 锁存"
