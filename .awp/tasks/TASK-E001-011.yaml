  - "配置寄存器在 CAPTURE 和 SHIFT 期间保持稳定（不被后续 AXI-Lite 写入干扰）"
  - "STATUS 寄存器互斥逻辑正确（idle/busy_capture/busy_shift/done）"
  - "连续 2 次 start（配不同参数）的行为正确"

