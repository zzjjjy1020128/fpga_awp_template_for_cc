notes: >
  ## 数据通路切片：控制通路

  ```
  s_axil_* → axil_slave_if → wr/rd_strobe → regs_top
                                    ↑↓ (rdata)
  regs_top → cfg_dir/cfg_step/cfg_wrap/img_rows/img_cols
           → ctrl_start/sw_reset
               → ctrl_fsm
                   → capture_en (→ axis_input)
                   → shift_en   (→ shift_addr_gen, axis_output)
  ```

  ## 关键验证点

  1. **使能信号时序**：capture_en/shift_en 在状态机跳转的同一拍还是下一拍有效
  2. **配置锁存**：CAPTURE 期间修改 CFG 是否影响当前帧（应不影响）
  3. **done 锁存清除**：STATUS.done 是否在下次 start 时正确清除
  4. **SW_RESET vs start 优先级**：同时置位时 ctrl_fsm 的处理
