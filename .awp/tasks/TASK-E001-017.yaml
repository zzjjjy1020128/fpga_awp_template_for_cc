notes: >
  ## IP 打包方案

  使用 Vivado `ipx::package_project` 流程：
  ```
  1. create_project -part xc7z020clg400-1
  2. add_files rtl/*.sv + set_property file_type SystemVerilog
  3. set_property top axil_2d_shift
  4. synth_design -mode out_of_context (可选，帮助接口推断)
  5. ipx::package_project -root_dir vivado/ip/axil_2d_shift_v1_0
  6. ipx::add_bus_interface 添加/修正 AXI 接口
  7. ipx::save_core
  ```

  ## 接口映射

  | RTL 端口组 | Vivado Bus Interface | 类型 |
  |-----------|---------------------|------|
  | s_axil_* (36 信号) | s_axil | aximm (slave) |
  | s_axis_* (3+ 信号) | s_axis | axis (slave) |
  | m_axis_* (3+ 信号) | m_axis | axis (master) |
  | clk, rstn | — | clock/reset (单独) |

  ## 自动化评估

  `ipx::package_project` 是 Vivado 标准 Tcl API，与 BD make_wrapper 不同，
  不依赖 GUI 才能完成的步骤。MCP Vivado 工具可以全自动执行。
  关键风险点：
  - 接口自动推断是否正确（可能需要手动 `ipx::add_bus_interface` 修正）
  - .sv 文件在 ipx 中的支持程度
  - out_of_context 综合是否能通过

  ## IP 目录结构预期

  ```
  vivado/ip/axil_2d_shift_v1_0/
    component.xml          ← IP 核描述文件
    xgui/
      axil_2d_shift_v1_0.tcl ← GUI 参数配置
    src/
      hdl/                  ← RTL 源文件（复制或引用）
        axil_2d_shift.sv
        axil_slave_if.sv
        ...
  ```
