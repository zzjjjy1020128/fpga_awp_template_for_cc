notes: >
  ## L5 冒烟测试范围

  L5 = "板上冒烟测试（上电、JTAG 检测、基本 I/O）"（workspace_manifest.json）

  ### Zynq 上板工作流
  Zynq-7000 的 PL 时钟 (FCLK_CLK0) 来自 PS PLL，必须通过 FSBL 初始化 PS
  后才能运行。因此 L5 冒烟测试**依赖 Vitis 工程**（TASK-E001-023）：
  Vitis 编译烧写 → FSBL 自动初始化 PS (PLL/DDR/时钟) → 自动加载 bitstream
  → FCLK_CLK0 运行 → ILA debug hub 可检测 → ILA 探针可用。

  ### 测试顺序（通过 Vitis 执行）
  1. 硬件连接检查（电源、JTAG、UART）→ 无需 Vivado，Vitis 自动完成
  2. Vitis 编译 TASK-E001-023 基础程序 → Run
  3. FSBL 自动初始化 PS → 加载 bitstream → 加载 ELF
  4. UART 输出：寄存器读写 PASS/FAIL
  5. Vivado Hardware Manager 打开 → ILA 探针验证（此时 debug hub 已有时钟）
  6. ILA 配置触发条件，捕获波形

  ### 不需要的内容
  - 不需要 DMA 数据传输正确性验证（那是 L6）
  - AXI-Lite 寄存器读写已由 Vitis C 程序覆盖
  - 不再使用 XSCT 手工方式（已被 Vitis FSBL 替代）

  ### 失败处理
  遵循 B-G4 上板迭代模型。L5 阶段的典型失败类别：CAT-HW, CAT-BS, CAT-AX, CAT-IL。
  每类有独立的轮次上限和升级路径。
