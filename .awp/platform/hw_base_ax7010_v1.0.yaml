#==============================================================================
# 硬件基座清单 — HW_BASE_AX7010_v1.0
#==============================================================================
platform:
  id: "HW_BASE_AX7010_v1.0"
  name: "Zynq-7000 Accelerator Shell (Alinx AX7010)"
  status: "frozen"
  frozen_date: "2026-06-08"
  description: >
    Zynq-7000 (xc7z010clg400-1) 加速器承载平台，基于 Alinx AX7010 开发板。
    PS7 + AXI Interconnect (GP) + AXI Interconnect (HP) + AXI DMA + System ILA x2。
    提供 4 个标准 accelerator 插槽。

  target:
    part: "xc7z010clg400-1"
    board: "Alinx AX7010"
    family: "zynq"

  vivado_project:
    path: "vivado/shift_2d_ax7010_260608/shift_2d_ax7010_260608.xpr"
    bd_name: "design_1"
    bd_file: "vivado/shift_2d_ax7010_260608/shift_2d_ax7010_260608.srcs/sources_1/bd/design_1/design_1.bd"
    wrapper: "design_1_wrapper"

  frozen_ip:
    - name: "processing_system7_0"
      vlnv: "xilinx.com:ip:processing_system7:5.5"
      role: "PS core (CPU, DDR, AXI, clock/reset, FCLK0=50MHz)"
    - name: "ps7_0_axi_periph"
      vlnv: "xilinx.com:ip:axi_interconnect:2.1"
      role: "GP control bus (1:2)"
    - name: "axi_mem_intercon"
      vlnv: "xilinx.com:ip:axi_interconnect:2.1"
      role: "HP data bus (2:1) — DMA MM2S/S2MM → PS HP0"
    - name: "axi_dma_0"
      vlnv: "xilinx.com:ip:axi_dma:7.1"
      role: "Stream ↔ DDR engine (8-bit MM2S + S2MM)"
    - name: "proc_sys_reset_0"
      vlnv: "xilinx.com:ip:proc_sys_reset:5.0"
      role: "Sync reset generator"
    - name: "system_ila_0"
      vlnv: "xilinx.com:ip:system_ila:1.1"
      role: "Debug: AXI interface monitor"
    - name: "system_ila_1"
      vlnv: "xilinx.com:ip:system_ila:1.1"
      role: "Debug: AXI interface monitor"
    - name: "xlconcat_0"
      vlnv: "xilinx.com:ip:xlconcat:2.1"
      role: "Interrupt concatenation"

  accelerator:
    name: "axil_2d_shift_0"
    vlnv: "awp:user:axil_2d_shift:1.0"
    ip_repo: "vivado/ip/axil_2d_shift_v1_0/"
    source_rtl: ["rtl/axil_2d_shift.sv", "rtl/axil_slave_if.sv", "rtl/regs_top.sv",
                 "rtl/ctrl_fsm.sv", "rtl/axis_input.sv", "rtl/shift_addr_gen.sv",
                 "rtl/axis_output.sv", "rtl/frame_buf_mgr.sv"]

  slots:
    SLOT_AXIL:
      protocol: "AXI4-Lite (aximm:1.0)"
      connection: "ps7_0_axi_periph M01 → accelerator s_axil"
    SLOT_AXIS_I:
      protocol: "AXI4-Stream (axis:1.0, 8-bit)"
      connection: "AXI DMA M_AXIS_MM2S → accelerator s_axis"
    SLOT_AXIS_O:
      protocol: "AXI4-Stream (axis:1.0, 8-bit)"
      connection: "accelerator m_axis → AXI DMA S_AXIS_S2MM"
    SLOT_IRQ:
      protocol: "Single wire"
      connection: "DMA s2mm_introut → xlconcat → PS IRQ_F2P"

  clock_reset:
    clock: "clk_fpga_0 (50 MHz, PS7 FCLK_CLK0, IO_PLL 1000MHz / 5 / 4)"
    reset: "peripheral_aresetn (proc_sys_reset, active-low)"

  constraints:
    frozen:
      - file: "constraints/ax7010_base_timing.xdc"
        role: "Base timing — 50 MHz clock auto-managed by PS7 IP"
      - file: "constraints/ax7010_base_physical.xdc"
        role: "Base physical — currently empty (DDR/FIXED_IO by PS7 automation)"

  validation:
    synthesis:
      status: "pass"
      errors: 0
      critical_warnings: 0
    implementation:
      status: "pass"
      errors: 0
      timing_met: true
      setup_wns_ns: 6.117
      hold_whs_ns: 0.032
    bitstream:
      status: "pass"
      file: "vivado/shift_2d_ax7010_260608/shift_2d_ax7010_260608.runs/impl_1/design_1_wrapper.bit"
      size_mb: 2.0

  freeze_rules:
    clock: "50 MHz frozen — 100 MHz 在 xc7z010-1 上时序不收敛（shift_addr_gen DSP 路径 16-20 级逻辑）"

  changelog:
    - version: "v1.0"
      date: "2026-06-08"
      changes:
        - "Initial frozen base: PS7 + 2×AXI Interconnect + DMA (8-bit) + System ILA x2"
        - "Clock: 50 MHz (100 MHz failed timing on xc7z010-1 — WNS -0.980 ns in shift_addr_gen)"
        - "Synthesis PASS (0 errors, 0 CW)"
        - "Implementation PASS (WNS +6.117 ns, WHS +0.032 ns)"
        - "Bitstream generated (2.0 MB)"
