  resolution: >
    System ILA BD SLOT supports BASIC_ONLY trigger with runtime-configurable compare values.
    Default all eq*'hX (don't-care) causes immediate trigger in IDLE state.
    Fix: set_property TRIGGER_COMPARE_VALUE {eq1'b1} on tvalid and tready probes.
    Combined with software gate mechanism, achieves precise DMA capture.
  notes:
    - "BASIC_ONLY trigger mode fully functional, format: eq<width>'<radix><value>"
    - "Software gate + handshake trigger replaces need for RTL ILA cross-trigger"

